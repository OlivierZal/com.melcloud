concurrency:
  cancel-in-progress: false
  group: publish
jobs:
  publish:
    environment: homey
    name: Publish app on Homey
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-and-install
        with:
          cache: none
          install: 'false'
      - run: cp "$NPM_CONFIG_USERCONFIG" "$GITHUB_WORKSPACE/.npmrc"
      - id: publish
        name: Publish
        uses: athombv/github-action-homey-app-publish@0642b483f1eb66fbceb0c91b73df35d45fd2f3db
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: URL
        env:
          URL: ${{ steps.publish.outputs.url }}
        run: echo "Manage your app at $URL" >> "$GITHUB_STEP_SUMMARY"
    timeout-minutes: 30
name: Publish app on Homey
on:
  release:
    types: [published]
  workflow_dispatch: {}
permissions: {}
