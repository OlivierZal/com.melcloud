concurrency:
  cancel-in-progress: false
  group: publish
jobs:
  publish:
    environment: homey
    name: Publish app on Homey
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # zizmor: ignore[cache-poisoning]
        with:
          node-version: '22'
          registry-url: https://npm.pkg.github.com
          scope: '@olivierzal'
      - run: cp $NPM_CONFIG_USERCONFIG ${{ github.workspace }}/.npmrc
      - id: publish
        name: Publish
        uses: athombv/github-action-homey-app-publish@0642b483f1eb66fbceb0c91b73df35d45fd2f3db
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: URL
        env:
          URL: ${{ steps.publish.outputs.url }}
        run: echo "Manage your app at $URL" >> "$GITHUB_STEP_SUMMARY"
    timeout-minutes: 30
name: Publish app on Homey
on:
  release:
    types: [published]
  workflow_dispatch: {}
permissions:
  contents: read
  packages: read
