jobs:
  publish:
    name: Publish app on Homey
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          cache: npm
          node-version: latest
          registry-url: https://npm.pkg.github.com
          scope: '@olivierzal'
      - run: cp $NPM_CONFIG_USERCONFIG ${{ github.workspace }}/.npmrc
      - id: publish
        name: Publish
        uses: athombv/github-action-homey-app-publish@0642b483f1eb66fbceb0c91b73df35d45fd2f3db
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: URL
        run: echo "Manage your app at ${{ steps.publish.outputs.url }}." >> $GITHUB_STEP_SUMMARY
name: Publish app on Homey
on:
  release:
    types: [published]
  workflow_dispatch: {}
permissions:
  contents: read
  packages: read
