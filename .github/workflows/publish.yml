concurrency:
  cancel-in-progress: false
  group: publish
jobs:
  publish:
    environment: homey
    name: Publish app on Homey
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-and-install
        with:
          cache: none
          npm-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cp "$NPM_CONFIG_USERCONFIG" "$GITHUB_WORKSPACE/.npmrc"
      - id: publish
        name: Publish
        uses: athombv/github-action-homey-app-publish@0642b483f1eb66fbceb0c91b73df35d45fd2f3db
        with:
          personal_access_token: ${{ secrets.HOMEY_PAT }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # The CLI's own `npm run build` (post-copy) must have emitted the
      # webview bundles into .homeybuild and stamped the packaged pages —
      # a silent regression here is the #1404 class. Post-hoc by
      # necessity (packing happens inside the action), so a failure here
      # fails the workflow loudly right after the upload.
      - name: Assert the packaged bundles
        run: |
          for file in settings/index.js settings/index.mjs \
            widgets/ata-group-setting/public/index.js \
            widgets/ata-group-setting/public/index.mjs \
            widgets/charts/public/index.js widgets/charts/public/index.mjs; do
            if [ ! -s ".homeybuild/$file" ]; then
              echo "::error::Missing packaged bundle: .homeybuild/$file"
              exit 1
            fi
          done
          if ! grep -q 'index\.js?v=' .homeybuild/settings/index.html; then
            echo "::error::Packaged settings HTML is unstamped"
            exit 1
          fi
      - name: URL
        env:
          URL: ${{ steps.publish.outputs.url }}
        run: echo "Manage your app at $URL" >> "$GITHUB_STEP_SUMMARY"
    timeout-minutes: 30
name: Publish app on Homey
on:
  release:
    types: [published]
  workflow_dispatch: {}
permissions: {}
