concurrency:
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
  group: ci-${{ github.ref }}
jobs:
  check:
    name: Check
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-node-and-install
        with:
          npm-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format
    timeout-minutes: 15
  test:
    name: Test (Node ${{ matrix.node-version }})
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-node-and-install
        with:
          node-version: ${{ matrix.node-version }}
          npm-token: ${{ secrets.GITHUB_TOKEN }}
      - run: npm test -- --coverage
      - if: matrix.node-version == 22 && (github.event_name == 'push' || (github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository))
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, latest, 'lts/*']
    timeout-minutes: 20
name: CI
on:
  merge_group: {}
  pull_request: {}
  push:
    branches: [main]
permissions: {}
