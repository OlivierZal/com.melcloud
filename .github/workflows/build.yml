concurrency:
  cancel-in-progress: true
  group: ci-${{ github.ref }}
jobs:
  audit:
    if: github.actor != 'dependabot[bot]'
    name: Audit
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache: npm
          node-version: latest
          registry-url: https://npm.pkg.github.com
          scope: '@olivierzal'
      - env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm audit --omit=dev
  lint:
    if: github.actor != 'dependabot[bot]'
    name: Lint
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache: npm
          node-version: latest
          registry-url: https://npm.pkg.github.com
          scope: '@olivierzal'
      - env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run format
  test:
    if: github.actor != 'dependabot[bot]'
    name: Test
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          cache: npm
          node-version: latest
          registry-url: https://npm.pkg.github.com
          scope: '@olivierzal'
      - env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm test -- --coverage
  validate:
    if: github.actor != 'dependabot[bot]'
    name: Validate app
    permissions:
      contents: write
      packages: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v6
        with:
          cache: npm
          node-version: latest
          registry-url: https://npm.pkg.github.com
          scope: '@olivierzal'
      - env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        name: Install dependencies
        run: npm ci
      - name: Build code & validate app
        uses: athombv/github-action-homey-app-validate@master
        with:
          level: publish
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
        name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --exit-code; then
            git commit -m "Code maintenance: lint, format and build code"
            if [[ ${{ github.ref }} == "refs/heads/main" ]]; then
              BRANCH_NAME="maintenance-$(date +'%Y%m%d%H%M%S')"
              git checkout -b "$BRANCH_NAME"
              git push origin "$BRANCH_NAME"
              gh pr create --base main --head "$BRANCH_NAME" --title "Maintenance PR" --body "Automatic code maintenance: lint, format and build code."
              PR_URL=$(gh pr view "$BRANCH_NAME" --json url -q '.url')
              gh pr merge --auto --merge --delete-branch "$PR_URL"
            else
              git pull origin $HEAD_REF --rebase
              git push origin HEAD:$HEAD_REF
            fi
          fi
name: Build app
on: [pull_request, push]
