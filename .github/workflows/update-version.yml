concurrency:
  cancel-in-progress: false
  group: update-version
jobs:
  update-version:
    name: Update app version
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # zizmor: ignore[artipacked]
      - id: update_app_version
        name: Update app version
        uses: athombv/github-action-homey-app-version@3342f092b437550e78074797b52fac6467a456e1
        with:
          changelog: ${{ inputs.changelog }}
          version: ${{ inputs.version }}
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.update_app_version.outputs.version }}
        name: Commit & push changes
        run: |
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update app version to v$VERSION"
          git tag "v$VERSION"
          git push origin HEAD --tags
          gh release create "v$VERSION" -t "v$VERSION" --notes "" --generate-notes
    timeout-minutes: 15
name: Update app version
on:
  workflow_dispatch:
    inputs:
      changelog:
        description: Changelog
        required: false
        type: string
      version:
        default: patch
        description: Version
        options:
          - major
          - minor
          - patch
        required: true
        type: choice
permissions: {}
