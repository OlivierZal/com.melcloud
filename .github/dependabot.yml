registries:
  npm-github:
    token: ${{ secrets.MY_GITHUB_PERSONAL_TOKEN }}
    type: npm-registry
    url: https://npm.pkg.github.com
updates:
  - directory: /
    groups:
      actions:
        patterns:
          - '*'
    package-ecosystem: github-actions
    schedule:
      interval: weekly
  - cooldown:
      default-days: 7
    directory: /
    groups:
      eslint:
        patterns:
          - '@eslint/*'
          - '@html-eslint/*'
          - '@stylistic/*'
          - eslint
          - eslint-*
          - typescript-eslint
      minor-and-patch:
        exclude-patterns:
          - '@eslint/*'
          - '@html-eslint/*'
          - '@stylistic/*'
          - '@vitest/*'
          - eslint
          - eslint-*
          - typescript-eslint
          - vitest
        update-types:
          - minor
          - patch
      vitest:
        patterns:
          - '@vitest/*'
          - vitest
    # The classic `typescript` package intentionally trails on the
    # newest line typescript-eslint supports (its peer range excludes
    # TS 7); the real compiler is `@typescript/native`. Re-evaluate
    # when typescript-eslint announces TypeScript 7 support.
    ignore:
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
    package-ecosystem: npm
    registries:
      - npm-github
    schedule:
      interval: weekly
version: 2
