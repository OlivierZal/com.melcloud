<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <title>MELCloud Settings</title>
        <script>
            // Canonical entry point from the app-settings docs: the SDK
            // needs this global at parse time. The page logic lives in the
            // module bundle; a failed bundle load still ends the overlay.
            function onHomeyReady(homey) {
                import('./index.mjs?v=fa15976f')
                    .then((module) => module.start(homey))
                    .catch((error) => {
                        globalThis.reportError?.(error)
                        homey.ready()
                        homey
                            .alert(homey.__('settings.loadFailed'))
                            .catch((alertError) => {
                                globalThis.reportError?.(alertError)
                            })
                    })
            }
        </script>
        <link href="index.css?v=b7fc840a" rel="stylesheet">
        <link href="index.mjs?v=fa15976f" rel="modulepreload">
        <script data-origin="settings" defer src="/homey.js"></script>
        <meta content="MELCloud settings" name="description">
    </head>
    <body>
        <header class="homey-header">
            <h1
                class="homey-title"
                data-i18n="settings.title"
            >MELCloud settings</h1>
        </header>
        <!-- Shown when at least one API is unauthenticated -->
        <div id="authentication" hidden>
            <fieldset class="homey-form-fieldset">
                <legend class="homey-form-legend" data-i18n="settings.authenticate.legend">Credentials</legend>
                <div class="homey-form-group">
                    <select
                        id="api"
                        class="homey-form-select"
                        aria-label="API"
                    >
                        <option value="classic">Classic</option>
                        <option value="home">Home</option>
                    </select>
                </div>
                <div id="login"></div>
                <div class="homey-form-group">
                    <button
                        id="authenticate"
                        type="button"
                        class="homey-button-primary-full"
                        data-i18n="settings.authenticate.button"
                    >Log in</button>
                </div>
            </fieldset>
        </div>
        <!-- Shown when at least one API is authenticated — hidden by default to prevent flash -->
        <div id="content" hidden>
            <fieldset class="homey-form-fieldset classic-only">
                <legend class="homey-form-legend" data-i18n="settings.errorLog.legend">Error history (Classic)</legend>
                <div class="homey-form-group container">
                    <button
                        id="see"
                        type="button"
                        class="homey-button-secondary-shadow"
                        data-i18n="settings.errorLog.see"
                    >See all errors</button>
                    <div class="container-inline-end">
                        <label
                            class="homey-form-label unset-margin"
                            data-i18n="settings.errorLog.since"
                            for="since"
                        >since</label>
                        <input
                            id="since"
                            type="date"
                        >
                    </div>
                </div>
                <div id="error_log" class="homey-form-group">
                    <div class="container-inline-end">
                        <span
                            id="period"
                            class="homey-form-label unset-margin bolded"
                        ></span>
                        <span
                            id="error_count"
                            class="homey-form-label unset-margin"
                            aria-live="polite"
                        ></span>
                    </div>
                </div>
            </fieldset>
            <fieldset class="homey-form-fieldset">
                <legend class="homey-form-legend" data-i18n="settings.devices.legend">Device settings</legend>
                <div id="settings_common"></div>
                <div class="homey-form-group container">
                    <button
                        id="refresh_settings_common"
                        type="button"
                        class="homey-button-secondary-shadow"
                        data-i18n="settings.refresh"
                    >Refresh</button>
                    <button
                        id="apply_settings_common"
                        type="button"
                        class="homey-button-danger-shadow"
                        data-i18n="settings.update"
                    >Update</button>
                </div>
            </fieldset>
            <!-- Shown when air-to-air devices exist -->
            <div id="has_devices_melcloud" hidden>
                <fieldset class="homey-form-fieldset">
                    <legend class="homey-form-legend" data-i18n="settings.devicesAta.legend">Air-to-air device settings (Classic)</legend>
                    <div class="homey-form-group">
                        <label
                            class="homey-form-label"
                            data-i18n="settings.devicesAta.autoAdjust"
                            for="auto_adjust"
                        >Auto-adjust air conditioning temperature</label>
                    </div>
                    <div class="homey-form-group">
                        <button
                            id="auto_adjust"
                            type="button"
                            class="homey-button-secondary-shadow-full"
                            data-i18n="settings.devicesAta.configure"
                        >Configure</button>
                    </div>
                    <div id="settings_melcloud" class="homey-form-group"></div>
                    <div class="homey-form-group container">
                        <button
                            id="refresh_settings_melcloud"
                            type="button"
                            class="homey-button-secondary-shadow"
                            data-i18n="settings.refresh"
                        >Refresh</button>
                        <button
                            id="apply_settings_melcloud"
                            type="button"
                            class="homey-button-danger-shadow"
                            data-i18n="settings.update"
                        >Update</button>
                    </div>
                </fieldset>
            </div>
            <!-- Shown when air-to-water devices exist -->
            <div id="has_devices_melcloud_atw" hidden>
                <fieldset class="homey-form-fieldset">
                    <legend class="homey-form-legend" data-i18n="settings.devicesAtw.legend">Air-to-water device settings (Classic)</legend>
                    <div id="settings_melcloud_atw" class="homey-form-group"></div>
                    <div class="homey-form-group container">
                        <button
                            id="refresh_settings_melcloud_atw"
                            type="button"
                            class="homey-button-secondary-shadow"
                            data-i18n="settings.refresh"
                        >Refresh</button>
                        <button
                            id="apply_settings_melcloud_atw"
                            type="button"
                            class="homey-button-danger-shadow"
                            data-i18n="settings.update"
                        >Update</button>
                    </div>
                </fieldset>
            </div>
            <fieldset class="homey-form-fieldset classic-only">
                <legend class="homey-form-legend" data-i18n="settings.zones.legend">Zone settings (Classic)</legend>
                <div class="homey-form-group">
                    <select
                        id="zones"
                        class="homey-form-select"
                        aria-label="Zones"
                        data-i18n-aria-label="widgets.zones"
                    ></select>
                </div>
                <div class="homey-form-group">
                    <label
                        class="homey-form-label"
                        data-i18n="settings.holidayMode.enabled"
                        for="enabled_holiday_mode"
                    >Enable holiday mode</label>
                    <select id="enabled_holiday_mode" class="homey-form-select">
                        <option
                            data-i18n="settings.boolean.false"
                            value="false"
                        >No</option>
                        <option
                            data-i18n="settings.boolean.true"
                            value="true"
                        >Yes</option>
                    </select>
                </div>
                <div class="homey-form-group">
                    <label
                        class="homey-form-label"
                        data-i18n="settings.holidayMode.startDate"
                        for="start_date"
                    >Start date</label>
                    <input
                        id="start_date"
                        type="datetime-local"
                    >
                </div>
                <div class="homey-form-group">
                    <label
                        class="homey-form-label"
                        data-i18n="settings.holidayMode.endDate"
                        for="end_date"
                    >End date</label>
                    <input
                        id="end_date"
                        type="datetime-local"
                    >
                </div>
                <div class="homey-form-group container">
                    <button
                        id="refresh_holiday_mode"
                        type="button"
                        class="homey-button-secondary-shadow"
                        data-i18n="settings.refresh"
                    >Refresh</button>
                    <button
                        id="apply_holiday_mode"
                        type="button"
                        class="homey-button-danger-shadow"
                        data-i18n="settings.update"
                    >Update</button>
                </div>
                <div class="homey-form-group">
                    <label
                        class="homey-form-label"
                        data-i18n="settings.frostProtection.enabled"
                        for="enabled_frost_protection"
                    >Enable frost protection</label>
                    <select id="enabled_frost_protection" class="homey-form-select">
                        <option
                            data-i18n="settings.boolean.false"
                            value="false"
                        >No</option>
                        <option
                            data-i18n="settings.boolean.true"
                            value="true"
                        >Yes</option>
                    </select>
                </div>
                <div class="homey-form-group">
                    <label
                        class="homey-form-label"
                        data-i18n="settings.frostProtection.min"
                        for="min"
                    >Minimum temperature</label>
                    <input
                        id="min"
                        type="number"
                        class="homey-form-input"
                        inputmode="numeric"
                    >
                </div>
                <div class="homey-form-group">
                    <label
                        class="homey-form-label"
                        data-i18n="settings.frostProtection.max"
                        for="max"
                    >Maximum temperature</label>
                    <input
                        id="max"
                        type="number"
                        class="homey-form-input"
                        inputmode="numeric"
                    >
                </div>
                <div class="homey-form-group container">
                    <button
                        id="refresh_frost_protection"
                        type="button"
                        class="homey-button-secondary-shadow"
                        data-i18n="settings.refresh"
                    >Refresh</button>
                    <button
                        id="apply_frost_protection"
                        type="button"
                        class="homey-button-danger-shadow"
                        data-i18n="settings.update"
                    >Update</button>
                </div>
            </fieldset>
        </div>
    </body>
</html>
