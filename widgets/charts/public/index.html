<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <title>MELCloud charts</title>
        <script>
            // Registered at parse time: the Homey SDK may dispatch
            // onHomeyReady before the module bundle below has loaded.
            window.homeyReady = new Promise((resolve) => {
                window.onHomeyReady = resolve
            })
        </script>
        <link href="styles/layout.css?v=a2e4374e" rel="stylesheet">
        <link href="styles/zone-select.css?v=2cded214" rel="stylesheet">
        <script type="module" src="index.mjs?v=d8b12fda"></script>
        <meta content="MELCloud charts" name="description">
    </head>
    <body class="homey-widget-full homey-text-align-center">
        <p
            id="init_error"
            class="homey-text-small"
            hidden
            role="alert"
        ></p>
        <select
            id="charts"
            class="zone-select chart-select"
            aria-label="Chart"
            data-i18n-aria-label="widgets.chart"
        ></select>
        <div class="picker-row">
            <select
                id="zones"
                class="zone-select"
                aria-label="Zones"
                data-i18n-aria-label="widgets.zones"
            ></select>
            <select
                id="days"
                class="zone-select"
                aria-label="Number of days"
                data-i18n-aria-label="widgets.days"
            ></select>
        </div>
        <div id="chart"></div>
    </body>
</html>
